server:
  port: 8080

spring:
  application:
    name: DataShield Lab

  datasource:
    url: jdbc:h2:mem:datashielddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true   # para demo, en producción siempre false

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always

# ─── Configuración de seguridad custom ──────────────────────────────────────
datashield:
  jwt:
    secret: "DataShieldLabSuperSecretKey2024ForEducationalPurposesOnly!!"
    expiration-ms: 3600000   # 1 hora

  crypto:
    aes-secret-key: "DataShield2024!!"  # 16 chars = AES-128 (demo); en prod usar AES-256 con Key Vault

# ─── Swagger / OpenAPI ──────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    display-request-duration: true

# ─── Logging ────────────────────────────────────────────────────────────────
logging:
  level:
    com.datashield: DEBUG
    org.springframework.security: INFO
